name: indoor_nav_assistant
description: AI-powered indoor navigation for the visually impaired
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Sensors & Location
  camera: ^0.10.5
  sensors_plus: ^4.0.2
  geolocator: ^11.0.0
  wifi_scan: ^0.4.0
  pedometer: ^4.0.1
  
  # AI/ML
  google_generativeai: ^0.2.2
  tflite_flutter: ^0.10.4
  image: ^4.1.3
  
  # Audio
  flutter_tts: ^4.0.2
  
  # Storage
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # Network
  http: ^1.2.0
  
  # Utils
  permission_handler: ^11.2.0
  
  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
